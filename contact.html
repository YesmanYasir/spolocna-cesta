<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
  (function(){
    try{
      var t = localStorage.getItem('sc-theme') || 'forest';
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){}
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Spoločná cesta</title>
<meta name="description" content="Send us a message or get in touch directly.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Switch color theme" title="Switch color theme">
  <span class="theme-toggle-dot"></span>
</button>

<main class="wrap">

  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
    Links
  </a>

  <header class="brand" style="margin-bottom:32px;">
    <h1 class="brand-name">Contact</h1>
    <p class="brand-tagline">We're here for you — get in touch.</p>
  </header>

  <!-- ---- Direct contact details ---- -->
  <section class="card">
    <h2 class="card-title">Direct contact</h2>

    <div class="contact-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6.5h18v11H3z"/><path d="M3 7l9 6 9-6"/></svg>
      <div>
        <p class="contact-label">Email</p>
        <p class="contact-value"><a href="mailto:info@spolocnacesta.sk">info@spolocnacesta.sk</a></p>
      </div>
    </div>

    <div class="contact-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4.5c0 8.5 7 15.5 15.5 15.5l1-3.6-4.4-1.5-1.6 1.9a13 13 0 0 1-6.8-6.8l1.9-1.6L8.1 3.5z"/></svg>
      <div>
        <p class="contact-label">Phone</p>
        <p class="contact-value"><a href="tel:+421900000000">+421 900 000 000</a></p>
      </div>
    </div>

    <div class="contact-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.1 7-11.5A7 7 0 1 0 5 9.5C5 14.9 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.4"/></svg>
      <div>
        <p class="contact-label">Address</p>
        <p class="contact-value">Ulica 1, 811 01 Bratislava</p>
      </div>
    </div>
  </section>

  <!-- ---- Form ---- -->
  <section class="card">
    <h2 class="card-title">Send us a message</h2>

    <form id="contactForm" action="mailto:info@spolocnacesta.sk" method="POST" enctype="text/plain">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="Name" type="text" placeholder="Your name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="Email" type="email" placeholder="you@email.com" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="Message" rows="4" placeholder="Tell us how we can help…" required></textarea>
      </div>
      <button class="submit-btn" type="submit">Send message</button>
    </form>

    <p class="form-note">
      Clicking "Send message" will open your email client with the message pre-filled.
    </p>
  </section>

  <footer class="foot">
    <p class="foot-credit">© 2026 Spoločná cesta</p>
  </footer>

</main>

<script>
  document.getElementById('themeToggle').addEventListener('click', function(){
    var current = document.documentElement.getAttribute('data-theme') || 'forest';
    var next = current === 'forest' ? 'logo' : 'forest';
    document.documentElement.setAttribute('data-theme', next);
    try{ localStorage.setItem('sc-theme', next); }catch(e){}
  });
</script>

</body>
</html>
